name: Release

# Build the Windows installer and publish it to GitHub Releases so the app's
# electron-updater feed picks it up. Triggered by pushing a version tag (vX.Y.Z),
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed for electron-builder to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # A non-draft GitHub Release requires the git tag to already exist. When
      # this workflow is run via workflow_dispatch (rather than a tag push) the
      # tag is missing, so create it here from the checked-out commit. Pushing
      # with GITHUB_TOKEN does NOT retrigger the on:push:tags trigger (GitHub
      # blocks token-triggered workflow recursion), so there's no loop. Skipped
      # when the tag already exists (i.e. the normal tag-push flow).
      - name: Create version tag if missing
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin — skipping."
          else
            git tag "$tag"
            git push origin "$tag"
            echo "Created and pushed $tag."
          fi

      # electron-builder uploads assets concurrently, and each upload creates the
      # release if it's missing — a race that produced TWO releases for the v1.0.8
      # tag, splitting latest.yml / exe / blockmap across them and 404-ing the
      # updater feed. Pre-creating the (non-draft) release here means each upload
      # finds it and attaches to the one release. Idempotent: skipped if it exists
      # (e.g. a re-run), and covers the tag-push flow too (tag already present).
      - name: Pre-create GitHub Release (prevents duplicate-release race)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
          else
            gh release create "$tag" --title "$version" --notes "Automated release of $tag."
            echo "Pre-created release $tag."
          fi

      # rebuild:electron ensures better-sqlite3 is built for Electron's ABI
      # (the v1.0.4 crash was a node-ABI binary shipped to an Electron runtime),
      # then electron-builder builds the NSIS installer and publishes it +
      # latest.yml to a non-draft GitHub Release (releaseType: release).
      - name: Build & publish Windows installer
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
